<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailaa — Giriş</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0B12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ailaa">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0B12; --bg-raised:#0F1120; --bg-raised-2:#15182A;
    --line:#23263D; --text:#ECEDF4; --text-muted:#8E90A8;
    --amber:#F5A93B; --coral:#FF6F59; --mint:#5FD9C8; --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column;}
  a{color:inherit; text-decoration:none;}
  body::before{content:""; position:fixed; inset:0; background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px); background-size:42px 42px; pointer-events:none; z-index:0;}

  header{position:sticky; top:0; z-index:50; background:rgba(20,24,43,0.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
  nav{display:flex; align-items:center; justify-content:space-between; padding:14px 20px; max-width:1120px; margin:0 auto;}
  .logo{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.3rem; letter-spacing:-0.02em; display:flex; align-items:center; gap:8px;}
  .logo::before{content:""; width:10px; height:10px; border-radius:3px; background:var(--amber); box-shadow:0 0 12px var(--amber);}
  .home-link{font-size:0.88rem; color:var(--text-muted);}
  .home-link:hover{color:var(--text);}

  main{flex:1; position:relative; z-index:1; display:flex; align-items:center; justify-content:center; padding:40px 20px;}
  .card{background:var(--bg-raised); border:1px solid var(--line); border-radius:18px; width:100%; max-width:400px; padding:32px 28px; box-shadow:0 30px 60px -20px rgba(0,0,0,0.5);}
  .card h1{font-family:'Space Grotesk',sans-serif; font-size:1.5rem; letter-spacing:-0.02em; margin-bottom:6px; text-align:center;}
  .card .sub{color:var(--text-muted); font-size:0.9rem; text-align:center; margin-bottom:24px;}

  .tabs{display:flex; gap:4px; background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:4px; margin-bottom:22px;}
  .tabs button{flex:1; background:none; border:none; color:var(--text-muted); padding:10px; border-radius:7px; font-family:inherit; font-size:0.9rem; font-weight:600; cursor:pointer;}
  .tabs button.active{background:var(--amber); color:#1a1508;}

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:0.8rem; color:var(--text-muted); margin-bottom:7px; font-weight:500;}
  .field input{width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text); padding:13px 14px; border-radius:10px; font-size:0.95rem; outline:none; font-family:inherit;}
  .field input:focus{border-color:var(--amber);}
  .field input::placeholder{color:var(--text-muted);}

  .submit-btn{width:100%; background:var(--amber); color:#1a1508; border:none; font-weight:700; font-size:0.98rem; padding:14px; border-radius:11px; cursor:pointer; font-family:inherit; margin-top:6px; transition:transform .15s ease;}
  .submit-btn:hover{transform:translateY(-1px);}
  .submit-btn:disabled{opacity:0.6; cursor:default; transform:none;}

  .msg{margin-top:16px; font-size:0.86rem; text-align:center; font-family:'JetBrains Mono',monospace; line-height:1.5; min-height:1em;}
  .msg.error{color:var(--coral);}
  .msg.success{color:var(--mint);}
  .msg.info{color:var(--text-muted);}

  .config-warn{background:rgba(255,111,89,0.1); border:1px solid rgba(255,111,89,0.4); border-radius:10px; padding:14px; font-size:0.82rem; color:var(--coral); font-family:'JetBrains Mono',monospace; line-height:1.6; margin-bottom:20px; display:none;}
  .config-warn.show{display:block;}

  /* account panel */
  .account{text-align:center; display:none;}
  .account.show{display:block;}
  .account .avatar{width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--amber),var(--coral)); margin:0 auto 16px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-family:'Space Grotesk',sans-serif; font-weight:700; color:#1a1508;}
  .account .email{font-family:'JetBrains Mono',monospace; font-size:0.9rem; color:var(--mint); margin-bottom:6px; word-break:break-all;}
  .account .welcome{color:var(--text-muted); font-size:0.88rem; margin-bottom:24px;}
  .teaser{background:var(--bg); border:1px dashed var(--line); border-radius:12px; padding:18px; margin-bottom:20px;}
  .teaser .soon{font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--amber); text-transform:uppercase; letter-spacing:0.1em;}
  .teaser h3{font-family:'Space Grotesk',sans-serif; font-size:1.05rem; margin:8px 0 4px;}
  .teaser p{color:var(--text-muted); font-size:0.85rem;}
  .logout-btn{width:100%; background:var(--bg-raised-2); color:var(--text); border:1px solid var(--line); font-weight:600; font-size:0.92rem; padding:12px; border-radius:10px; cursor:pointer; font-family:inherit;}
  .logout-btn:hover{border-color:var(--coral); color:var(--coral);}

  .auth-forms.hidden{display:none;}

  .role-toggle{display:flex; flex-direction:column; gap:8px;}
  .role-opt{display:flex; flex-direction:column; align-items:flex-start; gap:2px; text-align:left; background:var(--bg); border:1.5px solid var(--line); color:var(--text); padding:12px 14px; border-radius:11px; cursor:pointer; font-family:inherit; width:100%;}
  .role-opt .ic{font-size:1.1rem; margin-bottom:2px;}
  .role-opt .tt{font-weight:600; font-size:0.94rem;}
  .role-opt .dd{font-size:0.78rem; color:var(--text-muted);}
  .role-opt.active{border-color:var(--amber); background:rgba(245,169,59,0.08);}
  .role-badge{display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace; font-size:0.72rem; padding:4px 10px; border-radius:100px; margin-top:6px; border:1px solid var(--line);}
  .role-badge.dev{color:var(--amber); border-color:rgba(245,169,59,0.4); background:rgba(245,169,59,0.08);}
  .role-badge.player{color:var(--mint); border-color:rgba(89,216,199,0.4); background:rgba(89,216,199,0.08);}


  footer{border-top:1px solid var(--line); padding:24px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--text-muted); position:relative; z-index:1;}
  .lang-switch{display:inline-flex; gap:2px; background:var(--bg-raised); border:1px solid var(--line); border-radius:8px; padding:3px; margin-bottom:14px;}
  .lang-switch button{background:none; border:none; cursor:pointer; color:var(--text-muted); padding:5px 9px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:0.75rem; font-weight:500;}
  .lang-switch button.active{background:var(--amber); color:#1a1508;}

  /* premium atmosfer: köşe ışıltıları */
  .aura{position:fixed; inset:0; z-index:-1; pointer-events:none; overflow:hidden;}
  .aura::before,.aura::after{content:""; position:absolute; border-radius:50%; filter:blur(90px); opacity:0.4;}
  .aura::before{width:60vw; height:60vw; top:-22vw; left:-14vw; background:radial-gradient(circle,rgba(245,169,59,0.26),transparent 66%);}
  .aura::after{width:55vw; height:55vw; top:4vw; right:-18vw; background:radial-gradient(circle,rgba(139,124,246,0.24),transparent 66%);}
</style>
</head>
<body>
<div class="aura"></div>

<header>
  <nav>
    <a href="/" class="logo">ailaa</a>
    <a href="/" class="home-link" data-i18n="home">← Ana sayfa</a>
  </nav>
</header>

<main>
  <div class="card">
    <div class="config-warn" id="configWarn"></div>

    <!-- GİRİŞ / KAYIT FORMLARI -->
    <div class="auth-forms" id="authForms">
      <h1 data-i18n="title">Ailaa'ya hoş geldin</h1>
      <p class="sub" data-i18n="subtitle">Projeni yayınlamak için giriş yap.</p>

      <div class="tabs">
        <button id="tabLogin" class="active" data-i18n="tab_login">Giriş</button>
        <button id="tabSignup" data-i18n="tab_signup">Kayıt ol</button>
      </div>


      <div class="field" id="roleField" style="display:none;">
        <label data-i18n="role_label">Hesap türü</label>
        <div class="role-toggle" id="roleToggle">
          <button type="button" class="role-opt active" data-role="player">
            <span class="ic">🎮</span><span class="tt" data-i18n="role_player">Oynamak istiyorum</span>
            <span class="dd" data-i18n="role_player_d">Oyunları keşfet, kütüphanene ekle</span>
          </button>
          <button type="button" class="role-opt" data-role="developer">
            <span class="ic">🛠️</span><span class="tt" data-i18n="role_dev">Geliştiriciyim</span>
            <span class="dd" data-i18n="role_dev_d">Kendi oyununu/uygulamanı yükle, sat</span>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="email" data-i18n="email_label">E-posta</label>
        <input type="email" id="email" data-i18n-placeholder="email_ph" placeholder="ornek@eposta.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password" data-i18n="pass_label">Şifre</label>
        <input type="password" id="password" data-i18n-placeholder="pass_ph" placeholder="en az 6 karakter" autocomplete="current-password">
      </div>

      <button class="submit-btn" id="submitBtn" data-i18n="btn_login">Giriş yap</button>
      <div class="msg" id="msg"></div>
    </div>

    <!-- HESAP PANELİ -->
    <div class="account" id="account">
      <div class="avatar" id="avatar">A</div>
      <div class="email" id="accEmail"></div>
      <div class="welcome" data-i18n="welcome">Giriş yaptın 🎉</div>
      <span class="role-badge" id="roleBadge"></span>
      <div class="teaser">
        <h3 data-i18n="teaser_t">Projeni yükle</h3>
        <p data-i18n="teaser_p">Kendi oyununu/uygulamanı yükleyip yayınlayabilirsin — istersen ücretsiz, istersen ücretli.</p>
        <a href="/upload" id="teaserBtn" class="logout-btn" style="display:inline-block; margin-top:12px; color:var(--mint); border-color:var(--mint); text-decoration:none;" data-i18n="teaser_btn">Projeni yükle →</a>
      </div>
      <button class="logout-btn" id="logoutBtn" data-i18n="btn_logout">Çıkış yap</button>
    </div>
  </div>
</main>

<footer>
  <div class="lang-switch" role="group" aria-label="Language">
    <button type="button" data-lang="tr">TR</button>
    <button type="button" data-lang="en">EN</button>
    <button type="button" data-lang="de">DE</button>
  </div>
  <br>
  <span data-i18n="footer">ailaa © 2026</span>
</footer>

<!-- Ayarlar (Supabase bilgileri config.js içinde) -->
<script src="/config.js"></script>
<!-- Supabase istemcisi -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* Supabase bilgileri config.js dosyasından okunur. */
const SUPABASE_URL = window.AILAA_SUPABASE_URL || "BURAYA_PROJE_URL";
const SUPABASE_KEY = window.AILAA_SUPABASE_KEY || "BURAYA_PUBLISHABLE_KEY";

/* -------- ÇEVİRİLER -------- */
const I18N = {
  tr:{
    home:"← Ana sayfa", title:"Ailaa'ya hoş geldin", subtitle:"Projeni yayınlamak için giriş yap.",
    tab_login:"Giriş", tab_signup:"Kayıt ol",
    email_label:"E-posta", email_ph:"ornek@eposta.com",
    pass_label:"Şifre", pass_ph:"en az 6 karakter",
    btn_login:"Giriş yap", btn_signup:"Kayıt ol", btn_logout:"Çıkış yap",
    welcome:"Giriş yaptın 🎉", role_label:"Hesap türü", role_player:"Oyuncu", role_player_d:"Oyunları keşfet, kütüphanene ekle", role_dev:"Geliştirici", role_dev_d:"Kendi oyununu/uygulamanı yükle, sat", teaser_btn_player:"Mağazayı gez →", soon:"yakında", teaser_t:"Projeni yükle",
    teaser_p:"Yakında buradan kendi oyununu/uygulamanı yükleyip yayınlayabileceksin.", teaser_btn:"Projeni yükle →",
    footer:"ailaa © 2026",
    m_loading:"...", m_login_ok:"Giriş başarılı!", m_signup_ok:"Kayıt başarılı! Giriş yapılıyor...",
    m_check_email:"Neredeyse tamam! E-postana gelen onay bağlantısına tıkla.",
    e_config:"⚠ Supabase bilgileri girilmemiş. auth.html dosyasındaki SUPABASE_URL ve SUPABASE_KEY alanlarını doldur.",
    e_empty:"E-posta ve şifre gerekli.",
    e_invalid:"E-posta ya da şifre hatalı.",
    e_exists:"Bu e-posta zaten kayıtlı. Giriş yapmayı dene.",
    e_weak:"Şifre en az 6 karakter olmalı.",
    e_email_bad:"Geçerli bir e-posta gir.",
    e_generic:"Bir şeyler ters gitti, tekrar dene."
  },
  en:{
    home:"← Home", title:"Welcome to Ailaa", subtitle:"Sign in to publish your project.",
    tab_login:"Log in", tab_signup:"Sign up",
    email_label:"E-mail", email_ph:"you@email.com",
    pass_label:"Password", pass_ph:"at least 6 characters",
    btn_login:"Log in", btn_signup:"Sign up", btn_logout:"Log out",
    welcome:"You're signed in 🎉", role_label:"Account type", role_player:"Player", role_player_d:"Discover games, add to your library", role_dev:"Developer", role_dev_d:"Upload and sell your own game/app", teaser_btn_player:"Browse the store →", soon:"coming soon", teaser_t:"Upload your project",
    teaser_p:"Soon you'll be able to upload and publish your own game/app right here.", teaser_btn:"Upload your project →",
    footer:"ailaa © 2026",
    m_loading:"...", m_login_ok:"Signed in!", m_signup_ok:"Signed up! Logging you in...",
    m_check_email:"Almost there! Click the confirmation link in your email.",
    e_config:"⚠ Supabase details missing. Fill in SUPABASE_URL and SUPABASE_KEY in auth.html.",
    e_empty:"E-mail and password required.",
    e_invalid:"Wrong e-mail or password.",
    e_exists:"This e-mail is already registered. Try logging in.",
    e_weak:"Password must be at least 6 characters.",
    e_email_bad:"Enter a valid e-mail.",
    e_generic:"Something went wrong, try again."
  },
  de:{
    home:"← Startseite", title:"Willkommen bei Ailaa", subtitle:"Melde dich an, um dein Projekt zu veröffentlichen.",
    tab_login:"Anmelden", tab_signup:"Registrieren",
    email_label:"E-Mail", email_ph:"du@email.com",
    pass_label:"Passwort", pass_ph:"mindestens 6 Zeichen",
    btn_login:"Anmelden", btn_signup:"Registrieren", btn_logout:"Abmelden",
    welcome:"Du bist angemeldet 🎉", role_label:"Kontotyp", role_player:"Spieler", role_player_d:"Spiele entdecken, zur Bibliothek hinzufügen", role_dev:"Entwickler", role_dev_d:"Eigenes Spiel/App hochladen und verkaufen", teaser_btn_player:"Shop ansehen →", soon:"bald verfügbar", teaser_t:"Lade dein Projekt hoch",
    teaser_p:"Bald kannst du hier dein eigenes Spiel/deine App hochladen und veröffentlichen.", teaser_btn:"Projekt hochladen →",
    footer:"ailaa © 2026",
    m_loading:"...", m_login_ok:"Angemeldet!", m_signup_ok:"Registriert! Anmeldung läuft...",
    m_check_email:"Fast fertig! Klicke auf den Bestätigungslink in deiner E-Mail.",
    e_config:"⚠ Supabase-Daten fehlen. Fülle SUPABASE_URL und SUPABASE_KEY in auth.html aus.",
    e_empty:"E-Mail und Passwort erforderlich.",
    e_invalid:"Falsche E-Mail oder falsches Passwort.",
    e_exists:"Diese E-Mail ist bereits registriert. Versuche dich anzumelden.",
    e_weak:"Passwort muss mindestens 6 Zeichen haben.",
    e_email_bad:"Gib eine gültige E-Mail ein.",
    e_generic:"Etwas ist schiefgelaufen, versuche es erneut."
  }
};
const GEO_MAP={TR:"tr",CY:"tr",DE:"de",AT:"de",CH:"de",LI:"de",LU:"de"};
let currentLang="tr", mode="login";

function t(k){ return I18N[currentLang][k]; }
function applyLang(lang){
  if(!I18N[lang]) lang="en";
  currentLang=lang;
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ const k=el.getAttribute("data-i18n"); if(I18N[lang][k]!==undefined) el.textContent=I18N[lang][k]; });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{ const k=el.getAttribute("data-i18n-placeholder"); if(I18N[lang][k]!==undefined) el.placeholder=I18N[lang][k]; });
  document.querySelectorAll(".lang-switch button").forEach(b=>b.classList.toggle("active",b.dataset.lang===lang));
  updateModeUI();
  try{ localStorage.setItem("ailaa_lang",lang); }catch(e){}
}
async function detectLang(){
  try{ const s=localStorage.getItem("ailaa_lang"); if(s&&I18N[s]){ applyLang(s); return; } }catch(e){}
  let lang=null;
  try{
    const c=new AbortController(); const tm=setTimeout(()=>c.abort(),3000);
    const r=await fetch("https://ipapi.co/json/",{signal:c.signal}); clearTimeout(tm);
    if(r.ok){ const d=await r.json(); if(d&&d.country_code) lang=GEO_MAP[d.country_code]||"en"; }
  }catch(e){}
  if(!lang){ const n=(navigator.language||"en").slice(0,2).toLowerCase(); lang=I18N[n]?n:"en"; }
  applyLang(lang);
}
document.querySelectorAll(".lang-switch button").forEach(b=>b.addEventListener("click",()=>applyLang(b.dataset.lang)));

/* -------- Mod (giriş/kayıt) arayüzü -------- */
const tabLogin=document.getElementById("tabLogin");
const tabSignup=document.getElementById("tabSignup");
const submitBtn=document.getElementById("submitBtn");
let accountType="player";
document.getElementById("roleToggle").addEventListener("click",(e)=>{
  const b=e.target.closest(".role-opt"); if(!b) return;
  accountType=b.getAttribute("data-role");
  document.querySelectorAll(".role-opt").forEach(x=>x.classList.toggle("active", x===b));
});
function updateModeUI(){
  tabLogin.classList.toggle("active",mode==="login");
  tabSignup.classList.toggle("active",mode==="signup");
  submitBtn.textContent = mode==="login" ? t("btn_login") : t("btn_signup");
  document.getElementById("password").setAttribute("autocomplete", mode==="login"?"current-password":"new-password");
  document.getElementById("roleField").style.display = mode==="signup" ? "block" : "none";
}
tabLogin.addEventListener("click",()=>{ mode="login"; setMsg(""); updateModeUI(); });
tabSignup.addEventListener("click",()=>{ mode="signup"; setMsg(""); updateModeUI(); });

function setMsg(text,type){ const m=document.getElementById("msg"); m.textContent=text||""; m.className="msg"+(type?" "+type:""); }

/* -------- Supabase -------- */
const configured = !SUPABASE_URL.includes("BURAYA") && !SUPABASE_KEY.includes("BURAYA");
let db=null;
if(configured){ const { createClient } = supabase; db = createClient(SUPABASE_URL, SUPABASE_KEY); }

function mapError(msg){
  const m=(msg||"").toLowerCase();
  if(m.includes("invalid login")) return t("e_invalid");
  if(m.includes("already registered")||m.includes("already exists")||m.includes("user already")) return t("e_exists");
  if(m.includes("at least 6")||m.includes("password should")) return t("e_weak");
  if(m.includes("valid email")||m.includes("invalid email")||m.includes("unable to validate email")) return t("e_email_bad");
  return t("e_generic");
}

function showAccount(user){
  document.getElementById("authForms").classList.add("hidden");
  document.getElementById("account").classList.add("show");
  document.getElementById("accEmail").textContent=user.email;
  document.getElementById("avatar").textContent=(user.email[0]||"A").toUpperCase();
  const role = (user.user_metadata && user.user_metadata.account_type) || "player";
  const rb=document.getElementById("roleBadge");
  if(rb){
    const isDev = role==="developer";
    rb.className = "role-badge "+(isDev?"dev":"player");
    rb.textContent = isDev ? ("🛠️ "+t("role_dev")) : ("🎮 "+t("role_player"));
  }
  const teaserBtn=document.getElementById("teaserBtn");
  if(teaserBtn){
    if(role==="developer"){ teaserBtn.href="/upload"; teaserBtn.textContent=t("teaser_btn"); }
    else { teaserBtn.href="/store"; teaserBtn.textContent=t("teaser_btn_player"); }
  }
}
function showForms(){
  document.getElementById("authForms").classList.remove("hidden");
  document.getElementById("account").classList.remove("show");
}

submitBtn.addEventListener("click", async ()=>{
  if(!configured){ setMsg(t("e_config"),"error"); return; }
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  if(!email||!password){ setMsg(t("e_empty"),"error"); return; }

  submitBtn.disabled=true; setMsg(t("m_loading"),"info");
  try{
    if(mode==="login"){
      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if(error){ setMsg(mapError(error.message),"error"); }
      else { setMsg(t("m_login_ok"),"success"); showAccount(data.user); }
    } else {
      const { data, error } = await db.auth.signUp({ email, password, options:{ data:{ account_type: accountType } } });
      if(error){ setMsg(mapError(error.message),"error"); }
      else if(data.session){
        // herkese açık profildeki rolü de senkron tut (profil sayfası bunu okur)
        try{ await db.from("profiles").update({ role: accountType }).eq("id", data.user.id); }catch(e){}
        setMsg(t("m_signup_ok"),"success"); showAccount(data.user);
      }
      else { setMsg(t("m_check_email"),"info"); } // e-posta onayı açıksa
    }
  }catch(e){ setMsg(t("e_generic"),"error"); console.error(e); }
  submitBtn.disabled=false;
});

document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  if(db) await db.auth.signOut();
  showForms(); setMsg("");
  document.getElementById("email").value=""; document.getElementById("password").value="";
});

// Enter tuşuyla gönder
document.getElementById("password").addEventListener("keydown",(e)=>{ if(e.key==="Enter") submitBtn.click(); });

/* -------- Başlangıç -------- */
async function init(){
  await detectLang();
  if(!configured){
    const w=document.getElementById("configWarn");
    w.textContent=t("e_config"); w.classList.add("show");
    return;
  }
  // zaten giriş yapmışsa hesabı göster
  const { data } = await db.auth.getSession();
  if(data.session && data.session.user){ showAccount(data.session.user); }
}
init();
</script>
