<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailaa — Vitrin Önizlemesi</title>
<meta name="description" content="Ailaa mağazasını keşfet: AI ile yapılmış oyunlar ve araçlar. Oyna, kütüphanene ekle.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Ailaa">
<meta property="og:title" content="Ailaa Mağaza — AI ile yapılmış oyunlar ve araçlar">
<meta property="og:description" content="Keşfet, oyna, kütüphanene ekle. Vibe coder'ların vitrini burada.">
<meta property="og:url" content="https://ailaa.io/demo.html">
<meta property="og:image" content="https://ailaa.io/og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Ailaa Mağaza — AI ile yapılmış oyunlar ve araçlar">
<meta name="twitter:image" content="https://ailaa.io/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0B12; --bg-raised:#0F1120; --bg-raised-2:#15182A;
    --line:#23263D; --text:#ECEDF4; --text-muted:#8E90A8;
    --amber:#F5A93B; --coral:#FF6F59; --mint:#5FD9C8; --violet:#8B7CF6;
    --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; overflow-x:hidden;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:1120px; margin:0 auto; padding:0 24px;}
  body::before{content:""; position:fixed; inset:0; background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px); background-size:42px 42px; pointer-events:none; z-index:0;}

  /* NAV */
  header{position:sticky; top:0; z-index:50; background:rgba(20,24,43,0.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
  nav{display:flex; align-items:center; justify-content:space-between; padding:14px 20px; max-width:1120px; margin:0 auto; gap:12px;}
  .logo{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.3rem; letter-spacing:-0.02em; display:flex; align-items:center; gap:8px;}
  .logo::before{content:""; width:10px; height:10px; border-radius:3px; background:var(--amber); display:inline-block; box-shadow:0 0 12px var(--amber);}
  .nav-right{display:flex; align-items:center; gap:10px;}
  .lib-btn{display:flex; align-items:center; gap:7px; background:var(--bg-raised); border:1px solid var(--line); color:var(--text); padding:8px 14px; border-radius:8px; font-size:0.88rem; font-weight:500; cursor:pointer; font-family:inherit;}
  .lib-btn:hover{border-color:var(--amber);}
  .lib-count{background:var(--amber); color:#1a1508; font-family:'JetBrains Mono',monospace; font-size:0.72rem; font-weight:700; min-width:19px; height:19px; border-radius:100px; display:inline-flex; align-items:center; justify-content:center; padding:0 5px;}
  .home-link{font-size:0.88rem; color:var(--text-muted);}
  .nav-upload{font-size:0.82rem; font-weight:700; background:var(--amber); color:#1a1508; padding:8px 14px; border-radius:8px; white-space:nowrap; box-shadow:0 0 16px -6px var(--amber);}
  .home-link:hover{color:var(--text);}
  @media (max-width:600px){ .home-link{display:none;} }

  /* PREVIEW BANNER */
  .preview-banner{background:linear-gradient(90deg,rgba(245,169,59,0.12),rgba(255,111,89,0.12)); border-bottom:1px solid var(--line); text-align:center; padding:10px 16px; font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--amber); position:relative; z-index:1;}

  /* STORE HEAD */
  .store-head{position:relative; z-index:1; padding:50px 24px 20px; text-align:center;}
  .store-head h1{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(1.8rem,4vw,2.6rem); letter-spacing:-0.02em; margin-bottom:10px;}
  .store-head p{color:var(--text-muted); max-width:520px; margin:0 auto;}

  /* CONTROLS */
  .controls{position:relative; z-index:1; max-width:1000px; margin:32px auto 0; padding:0 24px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between;}
  .search-box{flex:1; min-width:200px; position:relative;}
  .search-box input{width:100%; background:var(--bg-raised); border:1px solid var(--line); color:var(--text); padding:11px 14px 11px 38px; border-radius:9px; font-size:0.92rem; outline:none; font-family:inherit;}
  .search-box input:focus{border-color:var(--amber);}
  .search-box input::placeholder{color:var(--text-muted);}
  .search-box .icon{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted);}
  .filters{display:flex; gap:6px; flex-wrap:wrap;}
  .filters button{background:var(--bg-raised); border:1px solid var(--line); color:var(--text-muted); padding:9px 16px; border-radius:9px; font-size:0.86rem; font-weight:500; cursor:pointer; font-family:inherit; white-space:nowrap;}
  .filters button.active{background:var(--amber); color:#1a1508; border-color:var(--amber);}

  /* GRID */
  .shelf{position:relative; z-index:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:18px; max-width:1000px; margin:28px auto 0; padding:0 24px 40px;}
  .cart{background:var(--bg-raised); border:1px solid var(--line); border-radius:12px; overflow:hidden; transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease; cursor:pointer;}
  .cart:hover{transform:translateY(-5px); box-shadow:0 20px 40px -15px rgba(0,0,0,0.55); border-color:var(--amber);}
  .cart:focus-visible{outline:2px solid var(--mint); outline-offset:2px;}
  .cart-art{height:130px; position:relative; display:flex; align-items:center; justify-content:center; font-size:2.4rem;}
  .cart-art .cat-tag{position:absolute; top:9px; left:9px; font-family:'JetBrains Mono',monospace; font-size:0.65rem; background:rgba(0,0,0,0.4); padding:3px 9px; border-radius:100px; text-transform:uppercase; letter-spacing:0.05em;}
  .cart-art .owned-badge{position:absolute; top:9px; right:9px; font-family:'JetBrains Mono',monospace; font-size:0.62rem; background:var(--mint); color:#082420; padding:3px 8px; border-radius:100px; font-weight:700; display:none;}
  .cart.owned .owned-badge{display:block;}
  .first-badge{position:absolute; top:9px; right:9px; font-family:'JetBrains Mono',monospace; font-size:0.62rem; background:var(--amber); color:#1a1508; padding:3px 8px; border-radius:100px; font-weight:700;}
  .cart.featured{border-color:rgba(245,169,59,0.5); box-shadow:0 0 0 1px rgba(245,169,59,0.25), 0 0 24px -6px rgba(245,169,59,0.4);}
  .cart.featured:hover{border-color:var(--amber);}
  .cart-info{padding:14px;}
  .cart-info h4{font-family:'Space Grotesk',sans-serif; font-size:1rem; margin-bottom:4px;}
  .cart-info .meta{font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--text-muted); display:flex; justify-content:space-between; align-items:center;}
  .cart-info .price{color:var(--mint); font-weight:700;}
  .cart-info .price.paid{color:var(--amber);}
  .empty-state{grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; font-size:0.9rem;}

  /* PUBLISH CTA CARD */
  .cart.publish{border-style:dashed; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px 18px; min-height:200px;}
  .cart.publish:hover{border-color:var(--mint);}
  .cart.publish .plus{font-size:2rem; color:var(--mint); margin-bottom:10px;}
  .cart.publish h4{font-family:'Space Grotesk',sans-serif; font-size:1rem; margin-bottom:6px;}
  .cart.publish p{font-size:0.8rem; color:var(--text-muted);}

  /* MODAL */
  .modal-overlay{position:fixed; inset:0; background:rgba(8,10,20,0.75); backdrop-filter:blur(4px); z-index:100; display:none; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto;}

  /* --- v2: istatistik, oy, yorum, satın alma --- */
  .cart-stats{font-size:0.76rem; color:var(--text-muted); font-family:'JetBrains Mono',monospace; margin-top:5px; display:flex; gap:10px;}
  .cart-stats .v{color:var(--amber);}
  .stats-row{display:flex; gap:16px; font-family:'JetBrains Mono',monospace; font-size:0.82rem; color:var(--text-muted); margin:10px 0 4px;}
  .stats-row .v{color:var(--amber);}
  .stats-row .p{color:var(--mint);}
  .vote-btn{background:var(--bg-raised); border:1px solid var(--line); color:var(--text); padding:10px 16px; border-radius:9px; font-size:0.88rem; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s;}
  .vote-btn.voted{background:rgba(245,169,59,0.14); border-color:var(--amber); color:var(--amber);}
  .vote-btn:disabled{opacity:0.55; cursor:default;}
  .dev a{color:var(--mint); border-bottom:1px dashed rgba(89,216,199,0.4);}
  .buy-note{font-size:0.76rem; color:var(--text-muted); margin-top:10px; text-align:right;}
  .comments{border-top:1px solid var(--line); padding:18px 22px 22px;}
  .comments h3{font-size:0.95rem; margin-bottom:12px; font-family:'Space Grotesk',sans-serif;}
  .c-row{padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05);}
  .c-row .c-head{display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:4px;}
  .c-row .c-user{color:var(--mint); font-weight:600;}
  .c-row .c-date{color:var(--text-muted);}
  .c-row .c-body{font-size:0.88rem; color:var(--text); word-break:break-word;}
  .c-empty{color:var(--text-muted); font-size:0.85rem; padding:8px 0;}
  .c-form{display:flex; gap:8px; margin-top:14px;}
  .c-form input{flex:1; background:var(--bg-raised); border:1px solid var(--line); color:var(--text); padding:10px 12px; border-radius:9px; font-size:0.88rem; outline:none; font-family:inherit;}
  .c-form input:focus{border-color:var(--amber);}
  .c-form button{background:var(--amber); color:#1a1508; border:none; padding:10px 18px; border-radius:9px; font-weight:700; cursor:pointer; font-family:inherit;}
  .c-login{font-size:0.85rem; color:var(--amber); display:inline-block; margin-top:12px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--bg-raised); border:1px solid var(--line); border-radius:16px; max-width:640px; width:100%; overflow:hidden; box-shadow:0 40px 80px -20px rgba(0,0,0,0.6); animation:pop .2s ease;}
  @keyframes pop{from{transform:scale(0.96); opacity:0;} to{transform:scale(1); opacity:1;}}
  .modal-hero{height:200px; position:relative; display:flex; align-items:center; justify-content:center; font-size:4rem;}
  .modal-close{position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.4); border:none; color:#fff; width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center;}
  .modal-body{padding:22px 24px 26px;}
  .modal-body .cat-tag{font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--amber); text-transform:uppercase; letter-spacing:0.06em;}
  .modal-body h2{font-family:'Space Grotesk',sans-serif; font-size:1.6rem; margin:6px 0 4px; letter-spacing:-0.01em;}
  .modal-body .dev{font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--text-muted); margin-bottom:16px;}
  .modal-body .desc{color:var(--text); font-size:0.94rem; margin-bottom:18px; line-height:1.6;}
  .shots{display:flex; gap:10px; margin-bottom:22px; overflow-x:auto;}
  .shots div{flex:0 0 140px; height:82px; border-radius:8px;}
  .modal-foot{display:flex; align-items:center; justify-content:space-between; gap:16px; border-top:1px solid var(--line); padding-top:20px;}
  .modal-price{font-family:'Space Grotesk',sans-serif; font-size:1.5rem; font-weight:700;}
  .modal-price.free{color:var(--mint);}
  .modal-price.paid{color:var(--amber);}
  .add-btn{background:var(--amber); color:#1a1508; border:none; font-weight:600; font-size:0.95rem; padding:13px 24px; border-radius:10px; cursor:pointer; font-family:inherit; white-space:nowrap; transition:transform .15s ease;}
  .add-btn:hover{transform:translateY(-1px);}
  .add-btn.owned{background:var(--bg-raised-2); color:var(--mint); cursor:default;}
  .add-btn:focus-visible, .modal-close:focus-visible{outline:2px solid var(--mint); outline-offset:2px;}

  /* ===== NEONDROME hareketli ikon ===== */
  .nd-scene{position:relative; width:88px; height:88px; border-radius:10px; overflow:hidden; background:radial-gradient(circle at 50% 42%,#1b1638,#0B0E1C); box-shadow:inset 0 0 0 1px rgba(89,216,199,0.3), 0 0 18px -4px rgba(89,216,199,0.5); flex:none;}
  .nd-scene .nd-grid{position:absolute; inset:0; background:repeating-linear-gradient(90deg, rgba(89,216,199,0.14) 0 1px, transparent 1px 12px); animation:nd-slide .5s linear infinite;}
  .nd-scene .nd-ground{position:absolute; left:0; right:0; top:58px; height:2px; background:#5FD9C8; box-shadow:0 0 6px #5FD9C8;}
  .nd-scene .nd-run{position:absolute; inset:0; animation:nd-bob .5s ease-in-out infinite alternate; filter:drop-shadow(0 0 4px #5FD9C8);}
  .nd-scene .nd-run>div{position:absolute;}
  .nd-scene .nd-head{left:40px; top:20px; width:9px; height:9px; background:#CFFAF3;}
  .nd-scene .nd-visor{left:41px; top:24px; width:7px; height:3px; background:#FF6F59;}
  .nd-scene .nd-body{left:39px; top:29px; width:11px; height:16px; background:#5FD9C8;}
  .nd-scene .nd-arm{left:49px; top:32px; width:4px; height:8px; background:#5FD9C8; animation:nd-arm .26s steps(1) infinite;}
  .nd-scene .nd-leg{width:4px; background:#5FD9C8;}
  .nd-scene .nd-leg1{left:39px; top:44px; height:10px; animation:nd-leg1 .26s steps(1) infinite;}
  .nd-scene .nd-leg2{left:46px; top:44px; height:10px; animation:nd-leg2 .26s steps(1) infinite;}
  .nd-scene .nd-streak{position:absolute; inset:0;}
  .nd-scene .nd-streak i{position:absolute; height:2px; width:16px; background:#5FD9C8; opacity:0; border-radius:2px;}
  .nd-scene .nd-streak i:nth-child(1){top:30px; animation:nd-streak .7s linear infinite;}
  .nd-scene .nd-streak i:nth-child(2){top:41px; width:12px; background:#F5A93B; animation:nd-streak .7s linear .25s infinite;}
  .nd-scene .nd-streak i:nth-child(3){top:51px; width:20px; animation:nd-streak .7s linear .5s infinite;}
  .nd-scene.nd-lg{transform:scale(1.7);}
  .nd-scene.nd-xl{transform:scale(2.2);}
  @keyframes nd-slide{to{background-position:-12px 0;}}
  @keyframes nd-bob{to{transform:translateY(-2px);}}
  @keyframes nd-leg1{0%,49%{height:10px;} 50%,100%{height:5px;}}
  @keyframes nd-leg2{0%,49%{height:5px;} 50%,100%{height:10px;}}
  @keyframes nd-arm{0%,49%{transform:translateY(0);} 50%,100%{transform:translateY(3px);}}
  @keyframes nd-streak{0%{transform:translateX(60px); opacity:0;} 15%{opacity:0.9;} 100%{transform:translateX(-40px); opacity:0;}}
  @media (prefers-reduced-motion:reduce){ .nd-scene *{animation:none !important;} }

  /* GAME OVERLAY */
  .game-overlay{position:fixed; inset:0; background:rgba(5,7,15,0.92); backdrop-filter:blur(6px); z-index:200; display:none; align-items:center; justify-content:center; padding:16px;}
  .game-overlay.open{display:flex;}
  .game-frame-wrap{width:100%; max-width:960px; max-height:100%; display:flex; flex-direction:column; background:#0B0E1C; border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:0 0 50px -10px rgba(89,216,199,0.3);}
  .game-bar{display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--bg-raised-2); border-bottom:1px solid var(--line); flex:none;}
  .game-bar-title{font-family:'JetBrains Mono',monospace; font-size:0.82rem; color:var(--mint); letter-spacing:0.05em;}
  .game-bar-btns{display:flex; gap:8px; align-items:center;}
  .game-close, .game-fs{background:rgba(0,0,0,0.35); border:1px solid var(--line); color:var(--text); width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:0.95rem; display:flex; align-items:center; justify-content:center;}
  .game-fs:hover{border-color:var(--mint); color:var(--mint);}
  .game-frame-inner{position:relative; width:100%; aspect-ratio:16/9; background:#05070F;}
  .game-frame-inner iframe{position:absolute; inset:0; width:100%; height:100%; border:0; display:block;}
  /* topluluk oyunları: tüm ekranı kaplasın (mini önizleme değil) */
  .game-overlay.full{padding:0;}
  .game-overlay.full .game-frame-wrap{max-width:none; height:100%; border:0; border-radius:0;}
  .game-overlay.full .game-frame-inner{aspect-ratio:auto; flex:1 1 auto; min-height:0;}
  .game-close{background:rgba(0,0,0,0.35); border:1px solid var(--line); color:var(--text); width:30px; height:30px; border-radius:7px; cursor:pointer; font-size:0.95rem; display:flex; align-items:center; justify-content:center;}
  .game-close:hover{border-color:var(--coral); color:var(--coral);}
  .game-frame-inner{position:relative; width:100%; aspect-ratio:16/9; background:#05070F;}
  .game-frame-inner iframe{position:absolute; inset:0; width:100%; height:100%; border:0; display:block;}
  /* şikayet */
  .report-area{margin-top:16px; text-align:center;}
  .report-btn{background:none; border:none; color:var(--text-muted); font-family:'JetBrains Mono',monospace; font-size:0.78rem; cursor:pointer; text-decoration:underline;}
  .report-btn:hover{color:var(--coral);}
  .report-reasons{display:flex; flex-wrap:wrap; gap:7px; align-items:center; justify-content:center;}
  .report-q{font-family:'JetBrains Mono',monospace; font-size:0.76rem; color:var(--text-muted); width:100%; margin-bottom:4px;}
  .report-reasons button{background:var(--bg-raised-2); border:1px solid var(--line); color:var(--text); font-family:inherit; font-size:0.76rem; padding:6px 11px; border-radius:100px; cursor:pointer;}
  .report-reasons button:hover{border-color:var(--coral); color:var(--coral);}
  .report-done{font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--mint);}
  footer{border-top:1px solid var(--line); padding:32px 24px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--text-muted); position:relative; z-index:1;}
  .lang-switch{display:inline-flex; gap:2px; background:var(--bg-raised); border:1px solid var(--line); border-radius:8px; padding:3px; font-size:0.75rem; margin-bottom:16px;}
  .lang-switch button{background:none; border:none; cursor:pointer; color:var(--text-muted); padding:5px 9px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:inherit; font-weight:500;}
  .lang-switch button.active{background:var(--amber); color:#1a1508;}

  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }

  /* premium atmosfer: köşe ışıltıları */
  .aura{position:fixed; inset:0; z-index:-1; pointer-events:none; overflow:hidden;}
  .aura::before,.aura::after{content:""; position:absolute; border-radius:50%; filter:blur(90px); opacity:0.4;}
  .aura::before{width:60vw; height:60vw; top:-22vw; left:-14vw; background:radial-gradient(circle,rgba(245,169,59,0.26),transparent 66%);}
  .aura::after{width:55vw; height:55vw; top:4vw; right:-18vw; background:radial-gradient(circle,rgba(139,124,246,0.24),transparent 66%);}
</style>
</head>
<body>
<div class="aura"></div>

<header>
  <nav>
    <a href="/" class="logo">ailaa</a>
    <div class="nav-right">
      <a href="/" class="home-link" data-i18n="nav_home">← Ana sayfa</a>
      <a href="/auth" id="loginLink" class="home-link" data-i18n="nav_login">Giriş</a>
      <a href="/upload" class="nav-upload" data-i18n="nav_upload">+ Yükle</a>
      <button class="lib-btn" id="libBtn">
        <span data-i18n="nav_library">Kütüphanem</span>
        <span class="lib-count" id="libCount">0</span>
      </button>
    </div>
  </nav>
</header>

<div class="preview-banner" data-i18n="banner">✦ Bu bir önizleme — Ailaa'nın vitrini gerçekte böyle görünecek. Aşağıdaki projeler örnektir.</div>

<div class="store-head">
  <h1 id="storeTitle" data-i18n="store_title">Keşfet</h1>
  <p id="storeSub" data-i18n="store_sub">AI ile üretilmiş oyunlar ve uygulamalar. Beğendiğini kütüphanene ekle.</p>
</div>

<div class="controls">
  <div class="search-box">
    <span class="icon">⌕</span>
    <input type="text" id="searchInput" data-i18n-placeholder="search_ph" placeholder="Ara...">
  </div>
  <div class="filters" id="filters">
    <button data-filter="all" class="active" data-i18n="f_all">Tümü</button>
    <button data-filter="game" data-i18n="f_game">Oyunlar</button>
    <button data-filter="tool" data-i18n="f_tool">Araçlar</button>
  </div>
  <div class="filters" id="sortTabs">
    <button data-sort="trend" class="active" data-i18n="sort_trend">🔥 Trend</button>

const GEO_MAP={TR:"tr",CY:"tr",DE:"de",AT:"de",CH:"de",LI:"de",LU:"de"};
const DEFAULT_LANG="en";
let currentLang="tr";
let currentFilter="all";
let currentSearch="";
let viewMode="store"; // "store" | "library"
let library=loadLibrary();
let currentUser=null, dbClient=null, isAdmin=false;   // giriş yapılınca dolar

function loadLibrary(){ try{ return JSON.parse(localStorage.getItem("ailaa_library")||"[]"); }catch(e){ return []; } }
function saveLibrary(){ try{ localStorage.setItem("ailaa_library", JSON.stringify(library)); }catch(e){} }

// hesaba bağlı kütüphaneyi Supabase'den yükle
async function loadAccountLibrary(){
  if(!currentUser || !dbClient) return;
  try{
    const { data } = await dbClient.from("library").select("item").eq("user_id", currentUser.id);
    if(data){ library = data.map(r=>r.item); updateLibCount(); render(); }
  }catch(e){}
}
// kütüphaneye ekle: giriş varsa Supabase'e, yoksa cihaz hafızasına
async function addToLibrary(id){
  if(library.includes(id)) return;
  library.push(id); updateLibCount(); render();
  if(currentUser && dbClient){
    try{ await dbClient.from("library").insert({ user_id: currentUser.id, item: id }); }catch(e){}
  } else {
    saveLibrary();
  }
}

/* ================= RENDER ================= */
/* NEONDROME hareketli ikon HTML'i */
function ndIcon(cls){
  return `<div class="nd-scene ${cls||''}">
    <div class="nd-grid"></div><div class="nd-ground"></div>
    <div class="nd-streak"><i></i><i></i><i></i></div>
    <div class="nd-run"><div class="nd-head"></div><div class="nd-visor"></div><div class="nd-body"></div><div class="nd-arm"></div><div class="nd-leg nd-leg1"></div><div class="nd-leg nd-leg2"></div></div>
  </div>`;
}
function cardIconHtml(a){ return a.id==="neondrome" ? ndIcon("") : `<span>${a.icon}</span>`; }

function priceLabel(price){ return price===0 ? I18N[currentLang].free : "$"+price; }

/* ===== Topluluk projeleri (Supabase'den yüklenenler) ===== */
let communityApps = [];
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function allApps(){ return APPS.concat(communityApps); }
// oyun bilgisi: topluluk projesi kendi alanlarını, örnekler i18n sözlüğünü kullanır
function appInfo(a){
  if(a.community){
    const dict=I18N[currentLang];
    return { t:a.title||"", g:(a.cat==="tool"?dict.cat_tool:dict.cat_game), d:a.desc||"" };
  }
  return I18N[currentLang].apps[a.id];
}
let roClient=null;            // giriş yapılmasa da okuma için istemci
let statsMap={};              // project_id -> {votes, comments, plays}
let myVotes=new Set();        // kullanıcının oyladığı project_id'ler
let sortMode="trend";

async function fetchCommunity(){
  const url=window.AILAA_SUPABASE_URL, key=window.AILAA_SUPABASE_KEY;
  if(!url||String(url).includes("BURAYA")||!key||String(key).includes("BURAYA")||typeof supabase==="undefined") return;
  try{
    const db = dbClient || (roClient = roClient || supabase.createClient(url,key));
    const { data, error } = await db.from("projects")
      .select("id,title,description,category,price,file_url,cover_url,created_at,plays,status,buy_url,user_id")
      .eq("status","approved")
      .order("created_at",{ascending:false}).limit(60);
    if(error||!data) return;

    // istatistikler (oy + yorum + oynanma) — tek sorgu
    try{
      const ids = data.map(p=>p.id);
      if(ids.length){
        const st = await db.from("project_stats").select("*").in("project_id", ids);
        if(st.data){ st.data.forEach(s=>{ statsMap[s.project_id]=s; }); }
      }
    }catch(e){}

    // geliştirici kullanıcı adları — tek sorgu
    const namesMap={};
    try{
      const uids=[...new Set(data.map(p=>p.user_id).filter(Boolean))];
      if(uids.length){
        const pr = await db.from("profiles").select("id,username").in("id", uids);
        if(pr.data){ pr.data.forEach(r=>{ namesMap[r.id]=r.username; }); }
      }
    }catch(e){}

    const grads=["g1","g2","g3","g4","g5","g6","g7","g8","g9"];
    communityApps = data.map(p=>({
      id:"c"+p.id, community:true, pid:p.id,
      cat:(p.category==="tool"?"tool":"game"),
      grad:grads[Math.abs(p.id)%grads.length],
      icon:(p.category==="tool"?"🛠️":"🎮"),
      price:p.price||0, dev:namesMap[p.user_id]||"topluluk", devUser:namesMap[p.user_id]||null,
      playable:true, createdAt:p.created_at, buyUrl:p.buy_url||null,
      fileUrl:p.file_url, cover:p.cover_url||null, title:p.title||"", desc:p.description||""
    }));
    render();
  }catch(e){}
}

function statFor(a){
  const s = a.pid ? statsMap[a.pid] : null;
  return { v: s?s.votes:0, c: s?s.comments:0, p: s?s.plays:0 };
}
function trendScore(a){
  const s=statFor(a);
  let score = s.v*5 + s.p;
  if(a.createdAt){
    const days=(Date.now()-new Date(a.createdAt).getTime())/86400000;
    if(days<7) score += Math.max(0, 10-days); // tazelik bonusu
  }
  return score;
}

function render(){
  const dict=I18N[currentLang];
  const shelf=document.getElementById("shelf");
  shelf.innerHTML="";

  // başlık store/library moduna göre
  document.getElementById("storeTitle").textContent = viewMode==="library" ? dict.lib_title : dict.store_title;
  document.getElementById("storeSub").textContent   = viewMode==="library" ? dict.lib_sub   : dict.store_sub;

  let list = allApps();
  if(viewMode==="library"){ list = list.filter(a=>library.includes(a.id)); }
  if(currentFilter!=="all"){ list = list.filter(a=>a.cat===currentFilter); }
  if(currentSearch){
    const q=currentSearch.toLowerCase();
    list = list.filter(a=>{
      const info=appInfo(a);
      return info.t.toLowerCase().includes(q) || info.g.toLowerCase().includes(q);
    });
  }

  // sıralama (mağaza modunda)
  if(viewMode==="store"){
    if(sortMode==="trend"){
      list = [...list].sort((a,b)=>trendScore(b)-trendScore(a));
    } else if(sortMode==="new"){
      list = [...list].sort((a,b)=>{
        const ta=a.createdAt?new Date(a.createdAt).getTime():0;
        const tb=b.createdAt?new Date(b.createdAt).getTime():0;
        return tb-ta;
      });
    }
  }

  if(list.length===0){
    const msg = viewMode==="library" && !currentSearch ? dict.empty_lib : dict.empty_search;
    shelf.innerHTML=`<div class="empty-state">${msg}</div>`;
    return;
  }

  list.forEach(a=>{
    const info=appInfo(a);
    const owned=library.includes(a.id);
    const card=document.createElement("div");
    card.className="cart"+(owned?" owned":"")+(a.first?" featured":"");
    card.tabIndex=0;
    card.setAttribute("role","button");
    const catLabel = a.playable ? dict.playable_tag : (a.cat==="game"?dict.cat_game:dict.cat_tool);
    const artStyle = a.cover ? `background-image:url('${a.cover}'); background-size:cover; background-position:center;` : `background:${GRADIENTS[a.grad]};`;
    card.innerHTML=`
      <div class="cart-art" style="${artStyle}">
        <span class="cat-tag">${a.playable?'▶ '+catLabel:catLabel}</span>
        ${a.first?`<span class="first-badge">${dict.first_badge}</span>`:`<span class="owned-badge">${dict.owned_badge}</span>`}
        ${a.cover ? '' : cardIconHtml(a)}
      </div>
      <div class="cart-info">
        <h4>${info.t}</h4>
        <div class="meta">
          <span>${info.g}</span>
          <span class="price ${a.price>0?'paid':''}">${priceLabel(a.price)}</span>
        </div>
        ${a.community ? (()=>{ const s=statFor(a); return `<div class="cart-stats"><span class="v">▲ ${s.v}</span><span>▶ ${s.p}</span></div>`; })() : ''}
      </div>`;
    card.addEventListener("click",()=>openModal(a.id));
    card.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openModal(a.id);} });
    shelf.appendChild(card);
  });

  // "Sen de yayınla" kartı sadece store modunda ve filtre/arama yokken
  if(viewMode==="store" && currentFilter==="all" && !currentSearch){
    const pub=document.createElement("a");
    pub.href="/upload";
    pub.className="cart publish";
    pub.innerHTML=`<div class="plus">+</div><h4>${dict.publish_t}</h4><p>${dict.publish_p}</p>`;
    shelf.appendChild(pub);
  }
}

/* ================= MODAL ================= */
function openModal(id){
  const a=allApps().find(x=>x.id===id);
  if(!a) return;
  const dict=I18N[currentLang];
  const info=appInfo(a);
  const owned=library.includes(id);
  const modal=document.getElementById("modal");
  const shotGrads=[a.grad, "g"+((parseInt(a.grad.slice(1))%9)+1), "g"+((parseInt(a.grad.slice(1))+2)%9+1)];
  const st = statFor(a);
  const voted = a.pid ? myVotes.has(a.pid) : false;
  const devHtml = a.devUser
    ? `${dict.by} <a href="/profile?u=${encodeURIComponent(a.devUser)}">@${escapeHtml(a.devUser)}</a>`
    : `${dict.by} ${escapeHtml(a.dev)}`;

  // ana aksiyon butonu: ücretsiz → kütüphane; ücretli → satın alma
  let mainBtn;
  if(a.price>0 && a.community){
    mainBtn = a.buyUrl
      ? `<button class="add-btn" id="buyBtn">${dict.buy} · ${priceLabel(a.price)}</button>`
      : `<button class="add-btn" disabled style="opacity:.55;">${dict.buy_soon}</button>`;
  } else {
    mainBtn = `<button class="add-btn ${owned?'owned':''}" id="addBtn" ${a.playable?'style="background:var(--bg-raised-2); color:var(--text);"':''}>
      ${owned ? dict.owned : (a.price>0?dict.add:dict.get)}
    </button>`;
  }

  modal.innerHTML=`
    <div class="modal-hero" style="${a.cover ? `background-image:url('${a.cover}'); background-size:cover; background-position:center;` : `background:${GRADIENTS[a.grad]};`}">
      <button class="modal-close" id="modalClose" aria-label="Kapat">✕</button>
      ${a.cover ? '' : (a.id==="neondrome" ? ndIcon("nd-lg") : `<span>${a.icon}</span>`)}
    </div>
    <div class="modal-body">
      <span class="cat-tag">${a.cat==="game"?dict.cat_game:dict.cat_tool} · ${info.g}</span>
      <h2>${info.t}</h2>
      <div class="dev">${devHtml}</div>
      ${a.community ? `<div class="stats-row"><span class="v">▲ ${st.v} ${dict.votes}</span><span class="p">▶ ${st.p} ${dict.plays}</span><span>💬 ${st.c}</span></div>` : ''}
      <div class="shots">
        ${shotGrads.map(g=>`<div style="background:${GRADIENTS[g]}"></div>`).join("")}
      </div>
      <p class="desc">${info.d}</p>
      <div class="modal-foot">
        <span class="modal-price ${a.price>0?'paid':'free'}">${priceLabel(a.price)}</span>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
          ${a.community ? `<button class="vote-btn ${voted?'voted':''}" id="voteBtn">${voted?dict.voted_btn:dict.vote_btn} · <span id="voteCount">${st.v}</span></button>` : ''}
          <button class="add-btn" id="shareProjBtn" style="background:var(--bg-raised-2); color:var(--text);">${dict.share}</button>
          ${a.playable?`<button class="add-btn" id="playBtn">${dict.play}</button>`:''}
          ${mainBtn}
        </div>
      </div>
      ${(a.price>0 && a.community && a.buyUrl) ? `<div class="buy-note">🔒 ${dict.buy_note}</div>` : ''}
    </div>
    ${a.community ? `<div class="comments" id="commentsWrap">
      <h3>💬 ${dict.comments_t}</h3>
      <div id="cList"><div class="c-empty">...</div></div>
      <div id="cFormWrap"></div>
    </div>` : ''}
    <div class="report-area" id="reportArea"></div>`;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow="hidden";

  document.getElementById("modalClose").addEventListener("click",closeModal);
  document.getElementById("shareProjBtn").addEventListener("click",()=>shareProject(a, info));
  if(a.playable){ document.getElementById("playBtn").addEventListener("click",()=>launchGame(a)); }
  if(a.community){
    const vb=document.getElementById("voteBtn");
    if(vb) vb.addEventListener("click",()=>toggleVote(a, vb));
    const bb=document.getElementById("buyBtn");
    if(bb) bb.addEventListener("click",()=>{ window.open(a.buyUrl, "_blank", "noopener"); });
    loadComments(a);
  }
  // şikayet et — sadece topluluk projeleri için
  if(a.community){
    const ra=document.getElementById("reportArea");
    let html=`<button class="report-btn" id="reportBtn">🚩 ${I18N[currentLang].report}</button>`;
    if(isAdmin){ html += ` &nbsp;·&nbsp; <button class="report-btn" id="adminDelBtn" style="color:var(--coral);">🗑 ${I18N[currentLang].admin_del}</button>`; }
    ra.innerHTML=html;
    document.getElementById("reportBtn").addEventListener("click",()=>showReport(a, ra));
    if(isAdmin){ document.getElementById("adminDelBtn").addEventListener("click",()=>adminDelete(a)); }
  }
  const addBtn=document.getElementById("addBtn");
  if(addBtn && !owned){
    addBtn.addEventListener("click", async ()=>{
      addBtn.classList.add("owned");
      addBtn.textContent=dict.owned;
      await addToLibrary(id);
    });
  }
  if(addBtn) addBtn.focus();
}

/* ===== OY SİSTEMİ ===== */
async function loadMyVotes(){
  if(!currentUser || !dbClient) return;
  try{
    const { data } = await dbClient.from("votes").select("project_id").eq("user_id", currentUser.id);
    if(data) myVotes = new Set(data.map(r=>r.project_id));
  }catch(e){}
}
async function toggleVote(a, btn){
  const dict=I18N[currentLang];
  if(!currentUser || !dbClient){ btn.textContent = dict.vote_login; setTimeout(()=>location.href="/auth", 900); return; }
  const pid=a.pid;
  const st = statsMap[pid] || (statsMap[pid]={project_id:pid, votes:0, comments:0, plays:0});
  btn.disabled=true;
  try{
    if(myVotes.has(pid)){
      await dbClient.from("votes").delete().eq("project_id",pid).eq("user_id",currentUser.id);
      myVotes.delete(pid); st.votes=Math.max(0, st.votes-1);
      btn.classList.remove("voted");
      btn.innerHTML = `${dict.vote_btn} · <span id="voteCount">${st.votes}</span>`;
    } else {
      const { error } = await dbClient.from("votes").insert({ project_id:pid, user_id:currentUser.id });
      if(!error){ myVotes.add(pid); st.votes++; }
      btn.classList.add("voted");
      btn.innerHTML = `${dict.voted_btn} · <span id="voteCount">${st.votes}</span>`;
    }
  }catch(e){}
  btn.disabled=false;
}

/* ===== YORUMLAR ===== */
function fmtCDate(s){ try{ return new Date(s).toLocaleDateString(); }catch(e){ return ""; } }
async function loadComments(a){
  const dict=I18N[currentLang];
  const listEl=document.getElementById("cList");
  const formEl=document.getElementById("cFormWrap");
  if(!listEl) return;
  const db = dbClient || roClient;
  if(!db){ listEl.innerHTML=`<div class="c-empty">${dict.c_empty}</div>`; return; }
  try{
    const { data } = await db.from("comments_view")
      .select("*").eq("project_id", a.pid)
      .order("created_at",{ascending:false}).limit(30);
    if(!data || !data.length){ listEl.innerHTML=`<div class="c-empty">${dict.c_empty}</div>`; }
    else{
      listEl.innerHTML = data.map(c=>`<div class="c-row">
        <div class="c-head"><span class="c-user">@${escapeHtml(c.username)}</span><span class="c-date">${fmtCDate(c.created_at)}</span></div>
        <div class="c-body">${escapeHtml(c.body)}</div>
      </div>`).join("");
    }
  }catch(e){ listEl.innerHTML=`<div class="c-empty">${dict.c_empty}</div>`; }

  if(currentUser && dbClient){
    formEl.innerHTML=`<div class="c-form">
      <input type="text" id="cInput" maxlength="500" placeholder="${dict.c_ph}">
      <button id="cSend">${dict.c_send}</button>
    </div>`;
    const send=async()=>{
      const inp=document.getElementById("cInput");
      const body=inp.value.trim();
      if(!body) return;
      inp.value="";
      try{
        await dbClient.from("comments").insert({ project_id:a.pid, user_id:currentUser.id, body });
        const st = statsMap[a.pid]; if(st) st.comments++;
        loadComments(a);
      }catch(e){}
    };
    document.getElementById("cSend").addEventListener("click",send);
    document.getElementById("cInput").addEventListener("keydown",(e)=>{ if(e.key==="Enter") send(); });
  } else {
    formEl.innerHTML=`<a class="c-login" href="/auth">${dict.c_login}</a>`;
  }
}
function closeModal(){
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow="";
}

/* Proje paylaşımı: yerel link + Web Share API (mobilde native paylaşım menüsü) */
async function shareProject(a, info){
  const url = location.origin + location.pathname + "?p=" + encodeURIComponent(a.id);
  const text = "🎮 " + info.t + " — Ailaa'da keşfet!";
  try{
    if(navigator.share){ await navigator.share({ title: info.t, text: text, url: url }); return; }
  }catch(e){ if(e && e.name==="AbortError") return; }
  try{
    await navigator.clipboard.writeText(url);
    const btn=document.getElementById("shareProjBtn");
    if(btn){ btn.textContent = I18N[currentLang].link_copied; setTimeout(()=>{ if(document.getElementById("shareProjBtn")) btn.textContent = I18N[currentLang].share; }, 2000); }
  }catch(e){}
}

/* Derin bağlantı: ?p=ID ile gelen ziyaretçiye projeyi direkt aç */
let deepLinkDone = false;
function tryDeepLink(){
  if(deepLinkDone) return;
  const p = new URLSearchParams(location.search).get("p");
  if(!p) { deepLinkDone = true; return; }
  const a = allApps().find(x=>String(x.id)===String(p));
  if(a){ deepLinkDone = true; openModal(a.id); }
}

/* Şikayet: neden seç → Supabase reports tablosuna yaz */
function showReport(app, container){
  const dict=I18N[currentLang];
  container.innerHTML = `<div class="report-reasons">
    <span class="report-q">${dict.report_q}</span>
    <button data-r="inappropriate">${dict.report_r1}</button>
    <button data-r="copyright">${dict.report_r2}</button>
    <button data-r="broken">${dict.report_r3}</button>
  </div>`;
  container.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>submitReport(app, b.dataset.r, container));
  });
}
async function submitReport(app, reason, container){
  const dict=I18N[currentLang];
  const projectId = parseInt(String(app.id).replace(/^c/,"")) || null;
  try{
    if(dbClient){
      await dbClient.from("reports").insert({ project_id: projectId, reason, reporter: currentUser?currentUser.id:null });
    }
  }catch(e){}
  container.innerHTML = `<div class="report-done">${dict.report_thanks}</div>`;
}

/* Admin: projeyi mağazadan anında sil */
async function adminDelete(app){
  if(!confirm(I18N[currentLang].admin_confirm)) return;
  try{
    const projectId = parseInt(String(app.id).replace(/^c/,""));
    if(app.fileUrl && dbClient){
      const path = String(app.fileUrl).split("/games/")[1];
      if(path){ await dbClient.storage.from("games").remove([decodeURIComponent(path)]); }
    }
    if(dbClient){ await dbClient.from("projects").delete().eq("id", projectId); }
    closeModal();
    fetchCommunity();  // mağazayı tazele
  }catch(e){ alert("Hata"); }
}

/* Oyunu güvenli çerçevede (sandbox) aç */
function launchGame(app){
  // oynanma sayacı (topluluk projeleri)
  if(app && app.pid){
    try{ (dbClient||roClient) && (dbClient||roClient).rpc("increment_plays",{ pid: app.pid }); }catch(e){}
    const st=statsMap[app.pid]; if(st) st.plays++;
  }
  const inner=document.getElementById("gameFrameInner");
  const bar=document.querySelector(".game-bar-title");
  const overlay=document.getElementById("gameOverlay");
  overlay.classList.add("open");
  overlay.classList.toggle("full", !!(app && app.fileUrl));  // topluluk oyunu → tam kapla
  document.body.style.overflow="hidden";

  if(app && app.fileUrl){
    // KULLANICI İÇERİĞİ: dosyayı çekip srcdoc ile enjekte et.
    // Böylece Supabase içeriği hangi content-type ile sunarsa sunsun oyun ÇALIŞIR (kod olarak görünmez).
    if(bar) bar.textContent="▶ "+(app.title||"oyun");
    inner.innerHTML=`<div style="color:#8E90A8;font-family:monospace;padding:48px;text-align:center;width:100%;">⏳</div>`;
    fetch(app.fileUrl).then(r=>r.text()).then(html=>{
      const iframe=document.createElement("iframe");
      iframe.setAttribute("sandbox","allow-scripts");     // parent'a/oturuma erişemez (güvenli)
      iframe.setAttribute("allow","autoplay; fullscreen");
      iframe.setAttribute("allowfullscreen","");
      iframe.setAttribute("title", app.title||"oyun");
      iframe.srcdoc=html;
      inner.innerHTML=""; inner.appendChild(iframe);
    }).catch(()=>{
      // yedek: çekilemezse doğrudan src ile dene
      inner.innerHTML=`<iframe src="${app.fileUrl}" sandbox="allow-scripts" title="${escapeHtml(app.title||'oyun')}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
    });
  } else {
    // BİZİM OYUN (NEONDROME): skorboard için same-origin
    if(bar) bar.textContent="▶ NEONDROME";
    inner.innerHTML=`<iframe src="/game?lang=${currentLang}" sandbox="allow-scripts allow-same-origin" title="NEONDROME" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  }
}
function closeGame(){
  const ov=document.getElementById("gameOverlay");
  ov.classList.remove("open","full");
  document.getElementById("gameFrameInner").innerHTML=""; // oyunu durdur
  document.body.style.overflow="";
}
document.getElementById("gameClose").addEventListener("click",closeGame);
document.getElementById("gameOverlay").addEventListener("click",(e)=>{ if(e.target.id==="gameOverlay") closeGame(); });
// tam ekran butonu: oyun çerçevesini tam ekrana al
document.getElementById("gameFs").addEventListener("click",()=>{
  const el=document.querySelector(".game-frame-wrap");
  try{
    if(document.fullscreenElement || document.webkitFullscreenElement){
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    } else if(el.requestFullscreen){ el.requestFullscreen(); }
    else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
  }catch(e){}
});
// oyunun içindeki çıkış butonundan gelen mesaj
window.addEventListener("message",(e)=>{ if(e.data && e.data.type==="ailaa_exit_game") closeGame(); });
document.getElementById("modalOverlay").addEventListener("click",(e)=>{ if(e.target.id==="modalOverlay") closeModal(); });
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape"){ closeGame(); closeModal(); } });

/* ================= LIBRARY / FILTER / SEARCH ================= */
function updateLibCount(){ document.getElementById("libCount").textContent=library.length; }
document.getElementById("libBtn").addEventListener("click",()=>{
  viewMode = viewMode==="store" ? "library" : "store";

  document.querySelectorAll("#filters button").forEach(b=>b.classList.toggle("active",b===btn));
  render();
});
document.getElementById("sortTabs").addEventListener("click",(e)=>{
  const btn=e.target.closest("button"); if(!btn) return;
  sortMode=btn.dataset.sort;
  document.querySelectorAll("#sortTabs button").forEach(b=>b.classList.toggle("active",b===btn));
  render();
});
document.getElementById("searchInput").addEventListener("input",(e)=>{ currentSearch=e.target.value.trim(); render(); });

/* ================= DİL ================= */
function applyLang(lang){
  if(!I18N[lang]) lang=DEFAULT_LANG;
  currentLang=lang;
  const dict=I18N[lang];
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ const k=el.getAttribute("data-i18n"); if(dict[k]!==undefined) el.textContent=dict[k]; });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{ const k=el.getAttribute("data-i18n-placeholder"); if(dict[k]!==undefined) el.placeholder=dict[k]; });
  document.querySelectorAll(".lang-switch button").forEach(b=>b.classList.toggle("active",b.dataset.lang===lang));
  try{ localStorage.setItem("ailaa_lang",lang); }catch(e){}
  render();
}
async function detectLang(){
  try{ const s=localStorage.getItem("ailaa_lang"); if(s&&I18N[s]){ applyLang(s); return; } }catch(e){}
  let lang=null;
  try{
    const c=new AbortController(); const t=setTimeout(()=>c.abort(),3000);
    const r=await fetch("https://ipapi.co/json/",{signal:c.signal}); clearTimeout(t);
    if(r.ok){ const d=await r.json(); if(d&&d.country_code) lang=GEO_MAP[d.country_code]||DEFAULT_LANG; }
  }catch(e){}
  if(!lang){ const n=(navigator.language||"en").slice(0,2).toLowerCase(); lang=I18N[n]?n:DEFAULT_LANG; }
  applyLang(lang);
}
document.querySelectorAll(".lang-switch button").forEach(btn=>btn.addEventListener("click",()=>applyLang(btn.dataset.lang)));

/* ================= INIT ================= */
updateLibCount();
detectLang();
</script>

<!-- Giriş durumu kontrolü -->
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async function(){
  try{
    const url=window.AILAA_SUPABASE_URL, key=window.AILAA_SUPABASE_KEY;
    if(url && !url.includes("BURAYA") && key && !key.includes("BURAYA") && typeof supabase!=="undefined"){
      dbClient = supabase.createClient(url, key);
      const { data } = await dbClient.auth.getSession();
      if(data.session && data.session.user){
        currentUser = data.session.user;
        isAdmin = window.AILAA_ADMIN_UID && !String(window.AILAA_ADMIN_UID).includes("BURAYA") && currentUser.id === window.AILAA_ADMIN_UID;
        const link = document.getElementById("loginLink");
        if(link){
          if(isAdmin){ link.setAttribute("data-i18n","nav_admin"); link.href="/admin"; link.style.color="var(--amber)"; }
          else { link.setAttribute("data-i18n","nav_account"); link.style.color="var(--mint)"; }
          applyLang(currentLang);
        }
        await loadAccountLibrary();   // hesaba bağlı kütüphaneyi getir
      }
    }
  }catch(e){}
  // topluluk projelerini yükle (Supabase hazırsa)
  try{ await fetchCommunity(); }catch(e){}
  // kullanıcının verdiği oyları getir
  try{ await loadMyVotes(); }catch(e){}
  // ?p= derin bağlantısı varsa projeyi direkt aç
  try{ tryDeepLink(); }catch(e){}
})();
</script>
